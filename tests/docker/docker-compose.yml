services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    ports:
      - "8123:8123"
    volumes:
      - ./ha_config:/config
      # All three integrations are installed together so the end-to-end tier
      # exercises the real Home Keeper + Battery Notes + this glue. Populate this
      # directory first with `bash ci/fetch-upstreams.sh`.
      - ./custom_components:/config/custom_components:ro
    environment:
      - TZ=America/New_York
    tmpfs:
      - /tmp
